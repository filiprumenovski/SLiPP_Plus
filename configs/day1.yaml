# SLiPP++ Day 1 configuration.
# All knobs live here. Edit, re-run `make all`.

seed_base: 42
n_iterations: 25
test_fraction: 0.10
split_strategy: stratified_shuffle

# v14        -> paper canonical 17 descriptors
# v14+v22    -> adds surf_pol_vdw22, surf_apol_vdw22 (already in CSV)
# v14+aa     -> adds 20 per-pocket amino-acid counts
# v14+v22+aa -> everything available in the CSV
feature_set: v14

models:
  - rf
  - xgb
  - lgbm

# Paper Table 1 ground truth, used by evaluate.py for side-by-side.
ground_truth:
  test:
    f1: 0.869
    auroc: 0.970
    accuracy: 0.968
    precision: 0.926
    sensitivity: 0.818
  apo_pdb:
    f1: 0.726
    auroc: 0.828
  alphafold:
    f1: 0.643
    auroc: 0.851

paths:
  training_csv: reference/SLiPP_2024-main/training_pockets.csv
  supporting_file_2_xlsx: data/raw/supplementary/ci5c01076_si_003.xlsx
  supporting_file_3_xlsx: data/raw/supplementary/ci5c01076_si_004.xlsx
  processed_dir: processed
  models_dir: models
  reports_dir: reports

# Rule 1 gate tolerances. Paper's 5x-balanced training set is static; require exact match.
validation:
  training_total_exact: 15219
  per_class_exact:
    CLR: 358
    MYR: 424
    OLA: 329
    PLM: 718
    STE: 152
    ADN: 414
    B12: 373
    BGC: 526
    COA: 2020
    PP: 9905
