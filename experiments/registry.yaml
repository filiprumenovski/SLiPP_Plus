    Clean ablation shows AA20 carries the major compact recovery
    (paper17+aa20 lipid macro-F1 0.645), shell12 alone is modest
    (0.567), v49 is the parsimony fallback (0.649), and compact tunnel
    shape adds the final lift (+0.017 over v49). External holdouts remain
    conservative and should be framed accordingly.

