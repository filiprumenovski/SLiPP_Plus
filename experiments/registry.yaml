    report: reports/legacy_rescue_rule_ablation_2026_05_09.md
  notes: >
    HOLDOUT-POSITIVE DIAGNOSTIC. Starting from exp-028, rescue only rows with
    exp-028 lipid probability below 0.50 when both paper17_family_encoder and
