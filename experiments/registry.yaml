    plm_f1: "0.630 ± 0.047"
    ste_f1: "0.576 ± 0.108"
  holdouts:
    apo_pdb_f1: 0.679
    alphafold_f1: 0.708
  artifacts:
    predictions: processed/v_sterol/predictions/hierarchical_lipid_predictions.parquet
    models: models/v_sterol_binary_ovr/
    report: reports/v_sterol_binary_ovr/hierarchical_lipid_report.md
    metrics: reports/v_sterol_binary_ovr/metrics_table.md
    bundle: models/v_sterol_binary_ovr/hierarchical_bundle.joblib
  notes: >
    NEGATIVE RESULT. Replaced Stage 2 five-way lipid softmax with 5 independent
    binary OvR XGB heads. STE F1 matched existing rescue stack (0.576) with zero
    post-hoc logic, but CLR/MYR/OLA/PLM all regressed 2-3pp each. Net: -0.028
    macro-F1 vs exp-009. The softmax simplex provides free inter-class discriminative
    signal for well-sampled classes; removing it costs more than it gains. Validates
    the current softmax + boundary-head architecture as near-optimal for this data regime.
