    clr_f1: "0.719 ± 0.047"
    ste_f1: "0.393 ± 0.087"
  artifacts:
    report: reports/ensemble/metrics.md
  notes: >
    CLR/STE tiebreaker fired only 2 times across 25 iterations (0.08%).
    Near-zero impact because STE's dominant confusion is with PLM, not CLR.
    This experiment proved the CLR/STE tiebreaker is the wrong intervention for STE.

