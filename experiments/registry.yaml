# experiments/registry.yaml
# Machine-readable experiment index for SLiPP++.
# Each entry records a completed experiment with its config, metrics, and artifacts.
# Updated by human or LLM after each experiment session.
#
# Schema:
#   id:               unique experiment identifier (exp-NNN-short-name)
#   date:             ISO date of completion
#   feature_set:      name from constants.FEATURE_SETS
#   config:           path to YAML config used
#   models:           list of model keys trained
#   postprocessing:   any post-hoc correction (e.g. tiebreaker)
#   status:           complete | in-progress | abandoned
#   is_current_best:  true only for the recommended production config
#   metrics:          headline numbers (mean across 25 iterations)
#   holdouts:         holdout set performance (iteration-0 model)
#   supersedes:       experiment ID this one replaces
#   artifacts:        paths to key output files
#   notes:            free-text context for LLMs

